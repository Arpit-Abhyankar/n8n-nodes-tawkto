name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like to see.

  - type: dropdown
    id: node-type
    attributes:
      label: Which node does this relate to?
      options:
        - Tawk.to Trigger
        - Tawk.to (REST API)
        - New node / credential
        - General / infrastructure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: "What problem does this solve? What workflow are you trying to build?"
      placeholder: "I'm trying to... but currently I can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How do you think this should work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternative approaches you've tried?"

  - type: textarea
    id: api-reference
    attributes:
      label: Tawk.to API reference
      description: "If this involves a Tawk.to API endpoint or webhook event, link to the relevant docs"
      placeholder: "https://developer.tawk.to/..."
